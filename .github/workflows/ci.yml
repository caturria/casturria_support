name: CI
on: [push]

jobs:
  build:
    name: Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build the library and its dependencies
        run: |
          sudo apt update -y
          sudo apt upgrade -y
          bash ./bootstrap.sh
